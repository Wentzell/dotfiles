# Model / reasoning
model_reasoning_effort  = "high"
model_reasoning_summary = "auto"
model_auto_compact_token_limit = 250000

# Approval / sandbox
approval_policy = "on-request"
sandbox_mode    = "workspace-write"

# Git
commit_attribution = "Assisted-by: Codex <noreply@openai.com>"

# Misc
check_for_update_on_startup = true
file_opener = "none"
personality = "pragmatic"

# Disable Codex fast mode by default (still toggleable per session via /fast).
[features]
fast_mode = false

# --- Lifecycle hooks: per-window tmux status square ---
# Mirrors the Claude Code hook setup; sets the @codex tmux user option,
# rendered by .tmux.conf as a colored ■ in the window status.

[[hooks.SessionStart]]
[[hooks.SessionStart.hooks]]
type = "command"
command = "~/.codex/hooks/tmux-status.sh codex done"

[[hooks.UserPromptSubmit]]
[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "~/.codex/hooks/tmux-status.sh codex busy"

[[hooks.PreToolUse]]
[[hooks.PreToolUse.hooks]]
type = "command"
command = "~/.codex/hooks/tmux-status.sh codex busy"

[[hooks.PermissionRequest]]
[[hooks.PermissionRequest.hooks]]
type = "command"
command = "~/.codex/hooks/tmux-status.sh codex input"

[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = "~/.codex/hooks/tmux-status.sh codex done"

[sandbox_workspace_write]
writable_roots = [
    "/home/wentzell/Dropbox/Coding",
    "/mnt/home/wentzell/opt",
]
network_access = true

# Shell env injected into Codex-launched commands
[shell_environment_policy]
inherit = "all"

[shell_environment_policy.set]
EDITOR                        = "vim"
PYTHONDONTWRITEBYTECODE       = "1"
CMAKE_EXPORT_COMPILE_COMMANDS = "ON"
CMAKE_COLOR_DIAGNOSTICS       = "ON"

# --- project trust ---
[projects."/home/wentzell/Simons Foundation Dropbox/Nils Wentzell/Coding/nda"]
trust_level = "trusted"

[projects."/home/wentzell/Simons Foundation Dropbox/Nils Wentzell/Coding"]
trust_level = "trusted"

[projects."/mnt/home/wentzell/dotfiles"]
trust_level = "trusted"

[plugins."github@openai-curated"]
enabled = true

[tui.model_availability_nux]
"gpt-5.5" = 2
